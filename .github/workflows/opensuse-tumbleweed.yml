name: opensuse-tumbleweed-dist
on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/opensuse-tumbleweed.yml'
      - '!opensuse/tumbleweed/**'
  workflow_dispatch:
  repository_dispatch:
    types: opensuse-tumbleweed-build
  schedule:
    - cron: '0 1 */3 * *'

jobs:
  build:
    name: Building opensuse tumbleweed docker images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dist:
          - {
              name: opensuse-tumbleweed-latest,
              os: opensuse-tumbleweed,
              symbol: "latest",
              platforms: "linux/amd64,linux/arm64/v8"
            }
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Prepare
        id: prepare
        run: |
          DIST_NAME=${{ matrix.dist.name }}
          USER_NAME=flameshot-org
          REPO_NAME=ci-building
          IMAGE_NAME=opensuse/tumbleweed/${{ matrix.dist.symbol }}
          REGISTRY_NAME=quay.io
          TAGS="${REGISTRY_NAME}/${USER_NAME}/${REPO_NAME}:${DIST_NAME}"
          echo "build_args=VERSION=${DIST_NAME}" >> $GITHUB_OUTPUT
          echo "image-name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}
      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: ./${{ steps.prepare.outputs.image-name }}
          file: ./${{ steps.prepare.outputs.image-name }}/Dockerfile
          platforms: ${{ matrix.dist.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: ${{ steps.prepare.outputs.build_args }}
          tags: ${{ steps.prepare.outputs.tags }}
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
      - name: Clear
        if: always()
        run: |
          rm -rf ${HOME}/.docker/config.json
