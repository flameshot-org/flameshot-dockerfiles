name: ubuntu-dist
on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/ubuntu.yml'
      - '!ubuntu/**'
  workflow_dispatch:
  repository_dispatch:
    types: ubuntu-build

jobs:
  build:
    name: Building ubuntu docker images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dist:
          - {
              name: ubuntu-jammy,
              os: ubuntu,
              # 22.04
              symbol: jammy,
              platforms: "linux/amd64,linux/arm64/v8,linux/arm/v7"
            }
          - {
              name: ubuntu-noble,
              os: ubuntu,
              # 24.04
              symbol: noble,
              platforms: "linux/amd64,linux/arm64/v8,linux/arm/v7"
            }
          - {
              name: ubuntu-resolute,
              os: ubuntu,
              # 26.04
              symbol: resolute,
              platforms: "linux/amd64,linux/arm64/v8,linux/arm/v7"
            }
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Prepare
        id: prepare
        run: |
          DIST_NAME=${{ matrix.dist.name }}
          USER_NAME=flameshot-org
          REPO_NAME=ci-building
          IMAGE_NAME=${{ matrix.dist.os }}/${{ matrix.dist.symbol }}
          REGISTRY_NAME=quay.io
          TAGS="${REGISTRY_NAME}/${USER_NAME}/${REPO_NAME}:${DIST_NAME}"
          echo "build_args=VERSION=${DIST_NAME}" >> $GITHUB_OUTPUT
          echo "image-name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}
      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: ./${{ steps.prepare.outputs.image-name }}
          file: ./${{ steps.prepare.outputs.image-name }}/Dockerfile
          platforms: ${{ matrix.dist.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: ${{ steps.prepare.outputs.build_args }}
          tags: ${{ steps.prepare.outputs.tags }}
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
      - name: Clear
        if: always()
        run: |
          rm -rf ${HOME}/.docker/config.json
